id = "reflection_self";
title = "Reflection Doesn't Return Self";
description = "Reflection used to return the original ``self`` type, including its case. Since PHP 8.5, it is now returning the actual name of the class, instead of the relative type.";
code = "<?php

// code from https://www.reddit.com/r/PHP/comments/1rd3j74/php_85_reflectionnamedtypegetname_change/
class Foo
{
    function poop (self $a): self
    {
    }
}

$refMethod = new ReflectionMethod('Foo', 'poop');
$refParam = $refMethod->getParameters()[0];

print_r(array(
    'paramType' => $refParam->getType()->getName(),
    'returnType' => $refMethod->getReturnType()->getName(),
));

?>";
before = "Array
(
    [paramType] => self
    [returnType] => self
)
";
after = "Array
(
    [paramType] => Foo
    [returnType] => Foo
)
";
seeAlso["PHP 8.5 ReflectionNamedType->getName() change?"] = "https://www.reddit.com/r/PHP/comments/1rd3j74/php_85_reflectionnamedtypegetname_change/";
deprecation = "";
phpVersion = "8.5";
alternatives[] = "";
related[] = "";
keywords[] = "";
alternatives[] = "Check for the self keyword, and only then, convert it to its actual class.";
related[] = "";
keywords[] = "silent";
features[] = "self";
features[] = "reflection";
