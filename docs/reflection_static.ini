id = "reflection_static";
title = "Reflection Doesn't Return Static";
description = "Reflection used to return the original ``static`` type, including its case. Since PHP 8.5, it is now returning the actual name of the class, instead of the relative type.";
code = "<?php

// code from https://www.reddit.com/r/PHP/comments/1rd3j74/php_85_reflectionnamedtypegetname_change/
class Foo
{
    function poop (static $a): static
    {
    }
}

$refMethod = new ReflectionMethod('Foo', 'poop');
$refParam = $refMethod->getParameters()[0];

print_r(array(
    'paramType' => $refParam->getType()->getName(),
    'returnType' => $refMethod->getReturnType()->getName(),
));

?>";
before = "Array
(
    [paramType] => static
    [returnType] => static
)
";
after = "Array
(
    [paramType] => Foo
    [returnType] => Foo
)
";
seeAlso["PHP 8.5 ReflectionNamedType->getName() change?"] = "https://www.reddit.com/r/PHP/comments/1rd3j74/php_85_reflectionnamedtypegetname_change/";
deprecation = "";
phpVersion = "8.5";
alternatives[] = "Check for the static keyword, and only then, convert it to its actual class.";
related[] = "";
keywords[] = "silent";
features[] = "static";
features[] = "reflection";
phpError[] = "none";
analyzer[] = "none";
